<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>E-Ticket Invoice</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; margin: 30px; font-size: 14px; }
        .header-table { width: 100%; margin-bottom: 20px; }
        .agency-name { color: #0056b3; font-size: 24px; font-weight: bold; }
        .support-info { font-size: 12px; color: #666; }

        .flight-header { background-color: #0056b3; color: white; padding: 10px; font-weight: bold; margin-top: 20px; }
        .flight-box { border: 1px solid #0056b3; padding: 15px; margin-bottom: 20px; }
        .flight-table { width: 100%; text-align: left; }
        .pnr-highlight { font-size: 18px; color: #0056b3; font-weight: bold; }

        .fare-box { width: 50%; float: right; border: 1px solid #ddd; padding: 15px; margin-top: 10px; background-color: #fdfdfd; }
        .fare-table { width: 100%; }
        .grand-total { font-weight: bold; color: #0056b3; font-size: 16px; border-top: 2px solid #ddd; padding-top: 10px; margin-top: 10px;}

        .clear { clear: both; }
    </style>
</head>
<body>

<table class="header-table">
    <tr>
        <td style="width: 50%;">
            <div class="agency-name" th:text="${invoice.agencyName}">Agency Name</div>
            <div class="support-info">
                Booked on: <span th:text="${invoice.bookingDate}">Date</span><br/>
            </div>
        </td>
        <td style="width: 50%; text-align: right; vertical-align: top;">
            <h2 style="margin:0; color:#333;">E-TICKET</h2>
        </td>
    </tr>
</table>

<div class="flight-header">
    Flight Details - <span th:text="${invoice.airline}">Airline</span>
</div>
<div class="flight-box">
    <table class="flight-table">
        <tr>
            <td style="width: 33%;">
                <strong>Origin:</strong><br/>
                <span th:text="${invoice.origin}">Origin</span>
            </td>
            <td style="width: 33%;">
                <strong>Destination:</strong><br/>
                <span th:text="${invoice.destination}">Destination</span>
            </td>
            <td style="width: 33%; text-align: right;">
                <strong>PNR / Booking Ref:</strong><br/>
                <span class="pnr-highlight" th:text="${invoice.pnr}">PNR</span>
            </td>
        </tr>
    </table>
</div>

<div style="margin-top: 20px; margin-bottom: 20px;">
    <strong style="color: #0056b3;">Passenger Details</strong>
    <table style="width: 100%; border-collapse: collapse; margin-top: 5px;">
        <thead>
        <tr style="background-color: #f4f4f4; text-align: left;">
            <th style="padding: 8px; border-bottom: 2px solid #ddd;">Passenger Name</th>
            <th style="padding: 8px; border-bottom: 2px solid #ddd;">Status</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td style="padding: 8px; border-bottom: 1px solid #ddd;" th:text="${invoice.passengerName}">Passenger Name</td>
            <td style="padding: 8px; border-bottom: 1px solid #ddd; color: green; font-weight: bold;">Confirmed</td>
        </tr>
        </tbody>
    </table>
</div>

<div class="fare-box">
    <table class="fare-table">
        <tr>
            <td class="grand-total">Grand Total:</td>
            <td class="grand-total" style="text-align: right;" th:text="${invoice.grandTotal}">0 INR</td>
        </tr>
    </table>
</div>

<div class="clear"></div>

</body>
</html>
